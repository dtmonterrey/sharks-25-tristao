<!DOCTYPE html>
<html>
    <head>
        <link href="style.css" rel="stylesheet" />
        <title>Slot machine 2 </title>
    </head>
    <body>
        <h2 >
            Slot Machine
        </h2> 
        <button onclick="Tryyourluck()" onclick="Lucky()">Tenta a tua sorte!</button> 
        <button onclick="stop()">Stop</button>
        <p>
            <span id="num1"></span>
            <span id="num2"></span>
            <span id="num3"></span>
        </p>
        <p id="ac"> </p>
        <h2 class="ini"><a href="index.html">    
                Início
                </a></h2>
        <script>
           const num1 = document.getElementById("num1")
           const num2 = document.getElementById("num2")
           const num3 = document.getElementById("num3")
           let ac = document.getElementById("ac")
           let Timer
           let timeout = 0

           function Tryyourluck() {
            const n1 = Math.round(Math.random() * 9)
            const n2 = Math.round(Math.random() * 9)
            const n3 = Math.round(Math.random() * 9)
            num1.innerHTML = n1
            num2.innerHTML = n2
            num3.innerHTML = n3
            timeout = timeout + 25
            if (timeout < 500)
                Timer = setTimeout(Tryyourluck,timeout)
            else
                stop() 
           }
           
           function stop() {
            clearTimeout(Timer)
            timeout = 0
           } 

           function Lucky() {
            const nc1 = Math.round(Math.random() * 9)
            const nc2 = Math.round(Math.random() * 9)
            const nc3 = Math.round(Math.random() * 9)
            if (nc1 == n2 && nc2 == n3) 
                ac.innerHTML = "Acertaste"
            else
                ac.innerHTML = "Erraste"

           }
        </script>
    </body>
</html>
